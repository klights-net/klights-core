name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            binutils \
            build-essential \
            cmake \
            g++-13 \
            gcc-13 \
            gzip \
            libmnl-dev \
            libnftnl-dev \
            libsqlite3-dev \
            libssl-dev \
            libzstd-dev \
            mold \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            rpm \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add x86_64-unknown-linux-gnu

      - name: Print release build diagnostics
        run: |
          rustc -Vv
          cargo -V
          gcc-13 --version | head -n 1
          g++-13 --version | head -n 1
          ld --version | head -n 1
          cc --version | head -n 1
          mold --version
          protoc --version
          pkg-config --modversion libmnl libnftnl sqlite3 zlib libzstd openssl
          pkg-config --libs --static libmnl libnftnl sqlite3 zlib libzstd openssl

      - name: Validate tag and derive version
        id: version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$GITHUB_REF_NAME'"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore staged static binary
        id: staged-binary
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p dist/binary-artifact
          if gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern klights-linux-x86_64-static \
            --dir dist/binary-artifact; then
            test -f dist/binary-artifact/klights-linux-x86_64-static
            mv dist/binary-artifact/klights-linux-x86_64-static dist/binary-artifact/klights
            chmod 0755 dist/binary-artifact/klights
            echo "restored=true" >> "$GITHUB_OUTPUT"
            echo "Reusing staged static binary from GitHub Release ${GITHUB_REF_NAME}"
          else
            rm -f dist/binary-artifact/klights dist/binary-artifact/klights-linux-x86_64-static
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "No staged static binary found for ${GITHUB_REF_NAME}; building from source."
          fi

      - name: Build static release binary
        if: steps.staged-binary.outputs.restored != 'true'
        env:
          CARGO_BUILD_JOBS: "2"
          CC: gcc-13
          CXX: g++-13
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc-13
        run: |
          set +e
          ./release.sh --static 2>&1 | tee release-build.log
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            echo "Release build failed with exit code $status"
            tail -n 300 release-build.log
            grep -Ei '(/usr/bin/ld|collect2|undefined reference|cannot find|killed|signal|fatal error|error: linking|ld returned)' release-build.log > release-linker-errors.log || true
            {
              echo "### Release build failed"
              echo
              echo "#### Linker diagnostics"
              echo
              echo '```text'
              if [[ -s release-linker-errors.log ]]; then
                tail -n 160 release-linker-errors.log
              else
                echo "No linker-specific diagnostics matched; showing release log tail."
              fi
              echo '```'
              echo
              echo "#### Release log tail"
              echo
              echo '```text'
              tail -n 80 release-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ -s release-linker-errors.log ]]; then
              summary="$(tail -n 20 release-linker-errors.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            else
              summary="$(tail -n 40 release-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            fi
            echo "::error title=Release build failed::$summary"
            exit "$status"
          fi
          cat release-build.log

      - name: Stage static binary artifact
        if: steps.staged-binary.outputs.restored != 'true'
        run: |
          mkdir -p dist/binary-artifact
          install -m 0755 target/release/klights dist/binary-artifact/klights
          install -m 0755 target/release/klights dist/binary-artifact/klights-linux-x86_64-static
          install -m 0644 release-build.log dist/binary-artifact/release-build.log

      - name: Publish staged static binary
        if: steps.staged-binary.outputs.restored != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: klights ${{ github.ref_name }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/binary-artifact/klights-linux-x86_64-static

      - name: Upload static binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: klights-static-binary
          path: dist/binary-artifact/klights
          retention-days: 14

  package:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download static binary
        uses: actions/download-artifact@v4
        with:
          name: klights-static-binary
          path: dist/binary

      - name: Install package tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            createrepo-c \
            dpkg-dev \
            gzip \
            gnupg \
            rpm

      - name: Prepare binary artifact
        run: |
          chmod +x dist/binary/klights

      - name: Validate tag and derive version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$GITHUB_REF_NAME'"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Import optional package GPG key
        env:
          PACKAGE_GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_GPG_PRIVATE_KEY }}
          PACKAGE_GPG_PASSPHRASE: ${{ secrets.PACKAGE_GPG_PASSPHRASE }}
        run: |
          if [[ -n "$PACKAGE_GPG_PRIVATE_KEY" ]]; then
            KEY_FILE="$RUNNER_TEMP/package-signing-key.asc"
            printf '%s\n' "$PACKAGE_GPG_PRIVATE_KEY" > "$KEY_FILE"

            if [[ -n "$PACKAGE_GPG_PASSPHRASE" ]] && ! gpg --batch --yes --pinentry-mode loopback --passphrase "$PACKAGE_GPG_PASSPHRASE" --import "$KEY_FILE"; then
              gpg --batch --yes --import "$KEY_FILE"
            elif [[ -z "$PACKAGE_GPG_PASSPHRASE" ]]; then
              gpg --batch --yes --import "$KEY_FILE"
            fi

            rm -f "$KEY_FILE"

            KEY_ID="$(gpg --batch --with-colons --list-secret-keys --keyid-format=long | awk -F: '$1 == "sec" { print $5; exit }')"
            if [[ -n "$KEY_ID" ]]; then
              echo "PACKAGE_GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build packages and publish repo metadata
        env:
          PACKAGE_GPG_PASSPHRASE: ${{ secrets.PACKAGE_GPG_PASSPHRASE }}
          PACKAGE_GPG_KEY_ID: ${{ env.PACKAGE_GPG_KEY_ID }}
        run: |
          set +e
          (
            set -euo pipefail
            mkdir -p dist/packages
            scripts/package/build-deb.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --suite noble --distro ubuntu24.04 --out dist/packages
            scripts/package/build-deb.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --suite resolute --distro ubuntu26.04 --out dist/packages
            scripts/package/build-rpm.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --distro el9 --out dist/packages
            scripts/package/build-rpm.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --distro el10 --out dist/packages
            test -f "dist/packages/klights_${KLIGHTS_VERSION}-1~noble_amd64.deb"
            test -f "dist/packages/klights_${KLIGHTS_VERSION}-1~resolute_amd64.deb"
            test -f "dist/packages/klights-${KLIGHTS_VERSION}-1.el9.x86_64.rpm"
            test -f "dist/packages/klights-${KLIGHTS_VERSION}-1.el10.x86_64.rpm"
            scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite noble --origin klights --label klights --codename noble
            scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite resolute --origin klights --label klights --codename resolute
            scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el9
            scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el10
            cd dist/packages
            shopt -s nullglob
            files=(*)
            if [[ ${#files[@]} -eq 0 ]]; then
              echo "No packages were produced in dist/packages"
              exit 1
            fi
            sha256sum "${files[@]}" \
              | sed -E 's/(  klights_[0-9.]+-1)~(noble|resolute)(_amd64[.]deb)$/\1.\2\3/' \
              > SHA256SUMS
          ) 2>&1 | tee package-build.log

          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            {
              echo "### Package build failed"
              echo
              echo "#### Package command tail"
              echo
              echo '```text'
              tail -n 160 package-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            summary="$(tail -n 160 package-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Package build failed::$summary"
            exit "$status"
          fi
          cat package-build.log

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klights-packages
          path: dist/packages/*
          retention-days: 14

      - name: Upload package repository artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klights-package-repos
          path: public
          retention-days: 14

  publish:
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: klights-packages
          path: dist/packages

      - name: Download package repositories
        uses: actions/download-artifact@v4
        with:
          name: klights-package-repos
          path: public

      - name: Validate tag and derive version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$GITHUB_REF_NAME'"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build release notes
        run: |
          NOTES="release-notes.md"
          VERSION="$KLIGHTS_VERSION"
          : > "$NOTES"

          if [[ -f CHANGELOG.md ]]; then
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]" { found = 1; print; next }
              found && $0 ~ "^## \\[" { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES"
          fi

          if [[ ! -s "$NOTES" ]]; then
            {
              echo "## klights ${VERSION}"
              echo
              echo "Release notes were not found in CHANGELOG.md for ${VERSION}."
            } > "$NOTES"
          fi

          {
            echo
            echo "## Binary packages"
            echo
            echo "This release publishes:"
            echo
            echo "- Ubuntu 24.04 (noble): \`klights_${VERSION}-1~noble_amd64.deb\`"
            echo "- Ubuntu 26.04 (resolute): \`klights_${VERSION}-1~resolute_amd64.deb\`"
            echo "- RHEL 9: \`klights-${VERSION}-1.el9.x86_64.rpm\`"
            echo "- RHEL 10: \`klights-${VERSION}-1.el10.x86_64.rpm\`"
            echo
            echo "Package repositories are published from the \`package-repo\` branch:"
            echo
            echo "- APT: https://raw.githubusercontent.com/klights-net/klights-core/package-repo/apt"
            echo "- RPM: https://raw.githubusercontent.com/klights-net/klights-core/package-repo/rpm"
          } >> "$NOTES"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: klights ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/packages/*

      - name: Publish package repository branch
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          repo_dir="$(mktemp -d)"

          git init "$repo_dir"
          cd "$repo_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan package-repo

          cp -a "${GITHUB_WORKSPACE}/public/." .
          touch .nojekyll
          cat > README.md <<EOF_REPO
          # klights package repository

          Generated from ${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}.

          APT base URL:

          \`\`\`text
          https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo/apt
          \`\`\`

          RPM base URL:

          \`\`\`text
          https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo/rpm
          \`\`\`
          EOF_REPO

          git add .
          git commit -m "chore: publish package repository for ${GITHUB_REF_NAME}"
          git push --force "$repo_url" package-repo

      - name: Verify hosted package repository
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo"
          paths=(
            "apt/dists/noble/Release"
            "apt/dists/noble/main/binary-amd64/Packages"
            "apt/dists/noble/main/binary-amd64/Packages.gz"
            "apt/dists/resolute/Release"
            "apt/dists/resolute/main/binary-amd64/Packages"
            "apt/dists/resolute/main/binary-amd64/Packages.gz"
            "rpm/el9/x86_64/repodata/repomd.xml"
            "rpm/el10/x86_64/repodata/repomd.xml"
          )

          for path in "${paths[@]}"; do
            url="${base_url}/${path}"
            ok=false
            for attempt in {1..12}; do
              if curl -fsSL "$url" >/tmp/klights-repo-check; then
                ok=true
                break
              fi
              sleep 5
            done
            if [[ "$ok" != "true" ]]; then
              echo "::error title=Package repository verification failed::Unable to fetch ${url}"
              exit 1
            fi
          done

          curl -fsSL "${base_url}/apt/dists/noble/main/binary-amd64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/apt/dists/resolute/main/binary-amd64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/rpm/el9/x86_64/repodata/repomd.xml" | grep -q 'primary'
          curl -fsSL "${base_url}/rpm/el10/x86_64/repodata/repomd.xml" | grep -q 'primary'
