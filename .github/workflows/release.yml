name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing vMAJOR.MINOR.PATCH tag to package'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - arch_name: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tagged commit checkout
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-list -n 1 "${RELEASE_REF_NAME}^{commit}")"
          current_commit="$(git rev-parse HEAD)"
          if [[ "$current_commit" != "$tag_commit" ]]; then
            echo "::error::Checkout HEAD ${current_commit} does not match ${RELEASE_REF_NAME} target ${tag_commit}"
            exit 1
          fi

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            binutils \
            build-essential \
            cmake \
            g++-13 \
            gcc-13 \
            gzip \
            libmnl-dev \
            libnftnl-dev \
            libsqlite3-dev \
            libssl-dev \
            libzstd-dev \
            mold \
            ninja-build \
            pkg-config \
            protobuf-compiler \
            rpm \
            zlib1g-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add "${{ matrix.rust_target }}"

      - name: Print release build diagnostics
        run: |
          rustc -Vv
          cargo -V
          gcc-13 --version | head -n 1
          g++-13 --version | head -n 1
          ld --version | head -n 1
          cc --version | head -n 1
          mold --version
          protoc --version
          pkg-config --modversion libmnl libnftnl sqlite3 zlib libzstd openssl
          pkg-config --libs --static libmnl libnftnl sqlite3 zlib libzstd openssl

      - name: Validate tag and derive version
        id: version
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$RELEASE_REF_NAME'"
            exit 1
          fi
          VERSION="${RELEASE_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore staged static binary
        id: staged-binary
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p dist/binary-artifact
          if gh release download "$RELEASE_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "klights-linux-${{ matrix.arch_name }}-static" \
            --dir dist/binary-artifact; then
            test -f "dist/binary-artifact/klights-linux-${{ matrix.arch_name }}-static"
            mv "dist/binary-artifact/klights-linux-${{ matrix.arch_name }}-static" dist/binary-artifact/klights
            chmod 0755 dist/binary-artifact/klights
            echo "restored=true" >> "$GITHUB_OUTPUT"
            echo "Reusing staged static binary from GitHub Release ${RELEASE_REF_NAME}"
          else
            rm -f dist/binary-artifact/klights "dist/binary-artifact/klights-linux-${{ matrix.arch_name }}-static"
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "No staged static binary found for ${RELEASE_REF_NAME}; building from source."
          fi

      - name: Build static release binary
        if: steps.staged-binary.outputs.restored != 'true'
        env:
          CARGO_BUILD_JOBS: "2"
          CC: gcc-13
          CXX: g++-13
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc-13
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: gcc-13
          KLIGHTS_STATIC_TARGET: ${{ matrix.rust_target }}
        run: |
          set +e
          ./release.sh --static 2>&1 | tee release-build.log
          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            echo "Release build failed with exit code $status"
            tail -n 300 release-build.log
            grep -Ei '(/usr/bin/ld|collect2|undefined reference|cannot find|killed|signal|fatal error|error: linking|ld returned)' release-build.log > release-linker-errors.log || true
            {
              echo "### Release build failed"
              echo
              echo "#### Linker diagnostics"
              echo
              echo '```text'
              if [[ -s release-linker-errors.log ]]; then
                tail -n 160 release-linker-errors.log
              else
                echo "No linker-specific diagnostics matched; showing release log tail."
              fi
              echo '```'
              echo
              echo "#### Release log tail"
              echo
              echo '```text'
              tail -n 80 release-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ -s release-linker-errors.log ]]; then
              summary="$(tail -n 20 release-linker-errors.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            else
              summary="$(tail -n 40 release-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            fi
            echo "::error title=Release build failed::$summary"
            exit "$status"
          fi
          cat release-build.log

      - name: Stage static binary artifact
        if: steps.staged-binary.outputs.restored != 'true'
        run: |
          mkdir -p dist/binary-artifact
          install -m 0755 target/release/klights dist/binary-artifact/klights
          install -m 0755 target/release/klights "dist/binary-artifact/klights-linux-${{ matrix.arch_name }}-static"
          install -m 0644 release-build.log dist/binary-artifact/release-build.log

      - name: Publish staged static binary
        if: steps.staged-binary.outputs.restored != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: klights ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/binary-artifact/klights-linux-${{ matrix.arch_name }}-static

      - name: Upload static binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: klights-static-binary-${{ matrix.arch_name }}
          path: dist/binary-artifact/klights
          retention-days: 14
  package:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
            rpm_arch: x86_64
            runtime_arch: amd64
          - arch_name: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64
            runtime_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tagged commit checkout
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-list -n 1 "${RELEASE_REF_NAME}^{commit}")"
          current_commit="$(git rev-parse HEAD)"
          if [[ "$current_commit" != "$tag_commit" ]]; then
            echo "::error::Checkout HEAD ${current_commit} does not match ${RELEASE_REF_NAME} target ${tag_commit}"
            exit 1
          fi

      - name: Download static binary
        uses: actions/download-artifact@v4
        with:
          name: klights-static-binary-${{ matrix.arch_name }}
          path: dist/binary

      - name: Install package tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            curl \
            dpkg-dev \
            gzip \
            rpm

      - name: Prepare binary artifact
        run: |
          chmod +x dist/binary/klights

      - name: Validate tag and derive version
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$RELEASE_REF_NAME'"
            exit 1
          fi
          VERSION="${RELEASE_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONTAINERD_VERSION=2.3.2" >> "$GITHUB_ENV"
          echo "RUNC_VERSION=1.5.0" >> "$GITHUB_ENV"

      - name: Build packages
        run: |
          set +e
          (
            set -euo pipefail
            mkdir -p dist/packages
            mkdir -p dist/runtime
            containerd_base="https://github.com/containerd/containerd/releases/download/v${CONTAINERD_VERSION}"
            containerd_asset="containerd-static-${CONTAINERD_VERSION}-linux-${{ matrix.runtime_arch }}.tar.gz"
            curl -fsSLo dist/runtime/containerd-LICENSE "https://raw.githubusercontent.com/containerd/containerd/v${CONTAINERD_VERSION}/LICENSE"
            curl -fsSLo dist/runtime/containerd-NOTICE "https://raw.githubusercontent.com/containerd/containerd/v${CONTAINERD_VERSION}/NOTICE"
            curl -fsSLo "dist/runtime/${containerd_asset}" "${containerd_base}/${containerd_asset}"
            curl -fsSLo "dist/runtime/${containerd_asset}.sha256sum" "${containerd_base}/${containerd_asset}.sha256sum"
            (cd dist/runtime && sha256sum -c "${containerd_asset}.sha256sum")
            mkdir -p "dist/runtime/containerd-${{ matrix.runtime_arch }}"
            tar -C "dist/runtime/containerd-${{ matrix.runtime_arch }}" -xzf "dist/runtime/${containerd_asset}"

            runc_base="https://github.com/opencontainers/runc/releases/download/v${RUNC_VERSION}"
            curl -fsSLo dist/runtime/runc.sha256sum "${runc_base}/runc.sha256sum"
            curl -fsSLo dist/runtime/runc-LICENSE "https://raw.githubusercontent.com/opencontainers/runc/v${RUNC_VERSION}/LICENSE"
            curl -fsSLo dist/runtime/runc-NOTICE "https://raw.githubusercontent.com/opencontainers/runc/v${RUNC_VERSION}/NOTICE"
            curl -fsSLo "dist/runtime/runc.${{ matrix.runtime_arch }}" "${runc_base}/runc.${{ matrix.runtime_arch }}"
            grep " runc.${{ matrix.runtime_arch }}$" dist/runtime/runc.sha256sum | (cd dist/runtime && sha256sum -c -)
            chmod 0755 "dist/runtime/runc.${{ matrix.runtime_arch }}"

            scripts/package/build-deb.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --suite noble --distro ubuntu24.04 --arch "${{ matrix.deb_arch }}" --out dist/packages
            scripts/package/build-deb.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --suite resolute --distro ubuntu26.04 --arch "${{ matrix.deb_arch }}" --out dist/packages
            scripts/package/build-rhel-runtime-rpms.sh --containerd-dir "dist/runtime/containerd-${{ matrix.runtime_arch }}" --runc-bin "dist/runtime/runc.${{ matrix.runtime_arch }}" --containerd-version "$CONTAINERD_VERSION" --runc-version "$RUNC_VERSION" --containerd-license dist/runtime/containerd-LICENSE --containerd-notice dist/runtime/containerd-NOTICE --runc-license dist/runtime/runc-LICENSE --runc-notice dist/runtime/runc-NOTICE --distro el9 --arch "${{ matrix.rpm_arch }}" --out dist/packages
            scripts/package/build-rhel-runtime-rpms.sh --containerd-dir "dist/runtime/containerd-${{ matrix.runtime_arch }}" --runc-bin "dist/runtime/runc.${{ matrix.runtime_arch }}" --containerd-version "$CONTAINERD_VERSION" --runc-version "$RUNC_VERSION" --containerd-license dist/runtime/containerd-LICENSE --containerd-notice dist/runtime/containerd-NOTICE --runc-license dist/runtime/runc-LICENSE --runc-notice dist/runtime/runc-NOTICE --distro el10 --arch "${{ matrix.rpm_arch }}" --out dist/packages
            scripts/package/build-rpm.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --distro el9 --arch "${{ matrix.rpm_arch }}" --out dist/packages
            scripts/package/build-rpm.sh --binary dist/binary/klights --version "$KLIGHTS_VERSION" --distro el10 --arch "${{ matrix.rpm_arch }}" --out dist/packages

            test -f "dist/packages/klights_${KLIGHTS_VERSION}-1~noble_${{ matrix.deb_arch }}.deb"
            test -f "dist/packages/klights_${KLIGHTS_VERSION}-1~resolute_${{ matrix.deb_arch }}.deb"
            test -f "dist/packages/containerd-${CONTAINERD_VERSION}-1.el9.${{ matrix.rpm_arch }}.rpm"
            test -f "dist/packages/containerd-${CONTAINERD_VERSION}-1.el10.${{ matrix.rpm_arch }}.rpm"
            test -f "dist/packages/runc-${RUNC_VERSION}-1.el9.${{ matrix.rpm_arch }}.rpm"
            test -f "dist/packages/runc-${RUNC_VERSION}-1.el10.${{ matrix.rpm_arch }}.rpm"
            test -f "dist/packages/klights-${KLIGHTS_VERSION}-1.el9.${{ matrix.rpm_arch }}.rpm"
            test -f "dist/packages/klights-${KLIGHTS_VERSION}-1.el10.${{ matrix.rpm_arch }}.rpm"
          ) 2>&1 | tee package-build.log

          status=${PIPESTATUS[0]}
          if [[ "$status" -ne 0 ]]; then
            {
              echo "### Package build failed"
              echo
              echo "#### Package command tail"
              echo
              echo '```text'
              tail -n 160 package-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            summary="$(tail -n 160 package-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Package build failed::$summary"
            exit "$status"
          fi
          cat package-build.log

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klights-packages-${{ matrix.arch_name }}
          path: dist/packages/*
          retention-days: 14

  publish:
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tagged commit checkout
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-list -n 1 "${RELEASE_REF_NAME}^{commit}")"
          current_commit="$(git rev-parse HEAD)"
          if [[ "$current_commit" != "$tag_commit" ]]; then
            echo "::error::Checkout HEAD ${current_commit} does not match ${RELEASE_REF_NAME} target ${tag_commit}"
            exit 1
          fi

      - name: Download x86_64 packages
        uses: actions/download-artifact@v4
        with:
          name: klights-packages-x86_64
          path: dist/packages-x86_64

      - name: Download arm64 packages
        uses: actions/download-artifact@v4
        with:
          name: klights-packages-arm64
          path: dist/packages-arm64

      - name: Merge package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/packages
          cp dist/packages-x86_64/* dist/packages/
          cp dist/packages-arm64/* dist/packages/

      - name: Install repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            apt-utils \
            createrepo-c \
            dpkg-dev \
            gzip \
            gnupg \
            rpm

      - name: Validate tag and derive version
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use vMAJOR.MINOR.PATCH format; got '$RELEASE_REF_NAME'"
            exit 1
          fi
          VERSION="${RELEASE_REF_NAME#v}"
          echo "KLIGHTS_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CONTAINERD_VERSION=2.3.2" >> "$GITHUB_ENV"
          echo "RUNC_VERSION=1.5.0" >> "$GITHUB_ENV"

      - name: Import package GPG key
        env:
          PACKAGE_GPG_PRIVATE_KEY: ${{ secrets.PACKAGE_GPG_PRIVATE_KEY }}
          PACKAGE_GPG_PASSPHRASE: ${{ secrets.PACKAGE_GPG_PASSPHRASE }}
        run: |
          if [[ -z "$PACKAGE_GPG_PRIVATE_KEY" ]]; then
            echo "::error::PACKAGE_GPG_PRIVATE_KEY is required for signed public package repositories"
            exit 1
          fi

          KEY_FILE="$RUNNER_TEMP/package-signing-key.asc"
          printf '%s\n' "$PACKAGE_GPG_PRIVATE_KEY" > "$KEY_FILE"

          if [[ -n "$PACKAGE_GPG_PASSPHRASE" ]] && ! gpg --batch --yes --pinentry-mode loopback --passphrase "$PACKAGE_GPG_PASSPHRASE" --import "$KEY_FILE"; then
            gpg --batch --yes --import "$KEY_FILE"
          elif [[ -z "$PACKAGE_GPG_PASSPHRASE" ]]; then
            gpg --batch --yes --import "$KEY_FILE"
          fi

          rm -f "$KEY_FILE"

          KEY_ID="$(gpg --batch --with-colons --list-secret-keys --keyid-format=long | awk -F: '$1 == "sec" { print $5; exit }')"
          if [[ -z "$KEY_ID" ]]; then
            echo "::error::PACKAGE_GPG_PRIVATE_KEY did not import a usable secret key"
            exit 1
          fi
          echo "PACKAGE_GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Export package public key
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGE_GPG_KEY_ID:-}" ]]; then
            echo "::error::PACKAGE_GPG_KEY_ID was not set by the GPG import step"
            exit 1
          fi
          mkdir -p public
          gpg --batch --yes --armor --export "$PACKAGE_GPG_KEY_ID" > public/klights-archive-keyring.asc
          test -s public/klights-archive-keyring.asc
          grep -q "BEGIN PGP PUBLIC KEY BLOCK" public/klights-archive-keyring.asc

      - name: Sign RPM packages
        env:
          PACKAGE_GPG_PASSPHRASE: ${{ secrets.PACKAGE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGE_GPG_KEY_ID:-}" ]]; then
            echo "::error::PACKAGE_GPG_KEY_ID was not set by the GPG import step"
            exit 1
          fi
          scripts/package/sign-rpms.sh --packages dist/packages

      - name: Build package repository metadata
        env:
          PACKAGE_GPG_PASSPHRASE: ${{ secrets.PACKAGE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${PACKAGE_GPG_KEY_ID:-}" ]]; then
            echo "::error::PACKAGE_GPG_KEY_ID was not set by the GPG import step"
            exit 1
          fi
          mkdir -p public
          scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite noble --arch amd64 --origin klights --label klights --codename noble
          scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite noble --arch arm64 --origin klights --label klights --codename noble
          scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite resolute --arch amd64 --origin klights --label klights --codename resolute
          scripts/package/publish-apt-repo.sh --packages dist/packages --repo public/apt --suite resolute --arch arm64 --origin klights --label klights --codename resolute
          scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el9 --arch x86_64
          scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el9 --arch aarch64
          scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el10 --arch x86_64
          scripts/package/publish-rpm-repo.sh --packages dist/packages --repo public/rpm --distro el10 --arch aarch64
          (
            cd dist/packages
            shopt -s nullglob
            files=(*)
            if [[ ${#files[@]} -eq 0 ]]; then
              echo "No packages were produced in dist/packages"
              exit 1
            fi
            sha256sum "${files[@]}" \
              | sed -E 's/(  klights_[0-9.]+-1)~(noble|resolute)(_(amd64|arm64)[.]deb)$/\1.\2\3/' \
              > SHA256SUMS
          )
          cat > public/index.html <<'EOF_HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>klights package repository</title>
          </head>
          <body>
            <main>
              <h1>klights package repository</h1>
              <p>Static APT and RPM package indexes for klights releases.</p>
              <ul>
                <li><a href="https://github.com/klights-net/klights-core">GitHub repository</a></li>
                <li><a href="./klights-archive-keyring.asc">Public key</a></li>
                <li><a href="./apt/">APT repository</a></li>
                <li><a href="./rpm/">RPM repository</a></li>
              </ul>
            </main>
          </body>
          </html>
          EOF_HTML
          cat > public/apt/index.html <<'EOF_HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>klights APT repository</title>
          </head>
          <body>
            <main>
              <h1>klights APT repository</h1>
              <p>This directory contains the signed APT repository metadata for klights.</p>
              <ul>
                <li><a href="https://github.com/klights-net/klights-core">GitHub repository</a></li>
                <li><a href="../klights-archive-keyring.asc">Public key</a></li>
                <li><a href="./dists/noble/InRelease">Ubuntu 24.04 noble InRelease</a></li>
                <li><a href="./dists/resolute/InRelease">Ubuntu 26.04 resolute InRelease</a></li>
              </ul>
            </main>
          </body>
          </html>
          EOF_HTML

      - name: Build release notes
        run: |
          NOTES="release-notes.md"
          VERSION="$KLIGHTS_VERSION"
          : > "$NOTES"

          if [[ -f CHANGELOG.md ]]; then
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]" { found = 1; print; next }
              found && $0 ~ "^## \\[" { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES"
          fi

          if [[ ! -s "$NOTES" ]]; then
            {
              echo "## klights ${VERSION}"
              echo
              echo "Release notes were not found in CHANGELOG.md for ${VERSION}."
            } > "$NOTES"
          fi

          {
            echo
            echo "## Binary packages"
            echo
            echo "This release publishes:"
            echo
            echo "- Static binaries: \`klights-linux-x86_64-static\`, \`klights-linux-arm64-static\`"
            echo "- Ubuntu 24.04 (noble): \`klights_${VERSION}-1~noble_amd64.deb\`, \`klights_${VERSION}-1~noble_arm64.deb\`"
            echo "- Ubuntu 26.04 (resolute): \`klights_${VERSION}-1~resolute_amd64.deb\`, \`klights_${VERSION}-1~resolute_arm64.deb\`"
            echo "- RHEL 9: \`klights-${VERSION}-1.el9.x86_64.rpm\`, \`klights-${VERSION}-1.el9.aarch64.rpm\`"
            echo "- RHEL 10: \`klights-${VERSION}-1.el10.x86_64.rpm\`, \`klights-${VERSION}-1.el10.aarch64.rpm\`"
            echo "- RHEL runtime dependencies: \`containerd-${CONTAINERD_VERSION}-1.el9.x86_64.rpm\`, \`containerd-${CONTAINERD_VERSION}-1.el9.aarch64.rpm\`, \`containerd-${CONTAINERD_VERSION}-1.el10.x86_64.rpm\`, \`containerd-${CONTAINERD_VERSION}-1.el10.aarch64.rpm\`, \`runc-${RUNC_VERSION}-1.el9.x86_64.rpm\`, \`runc-${RUNC_VERSION}-1.el9.aarch64.rpm\`, \`runc-${RUNC_VERSION}-1.el10.x86_64.rpm\`, \`runc-${RUNC_VERSION}-1.el10.aarch64.rpm\`"
            echo
            echo "Package repositories are published from the \`package-repo\` branch:"
            echo
            echo "- APT: https://raw.githubusercontent.com/klights-net/klights-core/package-repo/apt"
            echo "- RPM: https://raw.githubusercontent.com/klights-net/klights-core/package-repo/rpm"
            echo "- Public key: https://raw.githubusercontent.com/klights-net/klights-core/package-repo/klights-archive-keyring.asc"
          } >> "$NOTES"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: klights ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/packages/*

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gh release edit "$RELEASE_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "klights ${RELEASE_REF_NAME}" \
            --notes-file release-notes.md

      - name: Publish package repository branch
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          repo_dir="$(mktemp -d)"

          git init "$repo_dir"
          cd "$repo_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan package-repo

          cp -a "${GITHUB_WORKSPACE}/public/." .
          touch .nojekyll
          cat > README.md <<EOF_REPO
          # klights package repository

          Generated from ${GITHUB_REPOSITORY}@${RELEASE_REF_NAME}.

          APT base URL:

          \`\`\`text
          https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo/apt
          \`\`\`

          Public key:

          \`\`\`text
          https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo/klights-archive-keyring.asc
          \`\`\`

          RPM base URL:

          \`\`\`text
          https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo/rpm
          \`\`\`

          EOF_REPO

          git add .
          git commit -m "chore: publish package repository for ${RELEASE_REF_NAME}"
          git push --force "$repo_url" package-repo

      - name: Verify hosted package repository
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/package-repo"
          paths=(
            "index.html"
            "apt/index.html"
            "klights-archive-keyring.asc"
            "apt/dists/noble/InRelease"
            "apt/dists/noble/Release"
            "apt/dists/noble/Release.gpg"
            "apt/dists/noble/main/binary-amd64/Packages"
            "apt/dists/noble/main/binary-amd64/Packages.gz"
            "apt/dists/noble/main/binary-arm64/Packages"
            "apt/dists/noble/main/binary-arm64/Packages.gz"
            "apt/dists/resolute/InRelease"
            "apt/dists/resolute/Release"
            "apt/dists/resolute/Release.gpg"
            "apt/dists/resolute/main/binary-amd64/Packages"
            "apt/dists/resolute/main/binary-amd64/Packages.gz"
            "apt/dists/resolute/main/binary-arm64/Packages"
            "apt/dists/resolute/main/binary-arm64/Packages.gz"
            "rpm/el9/x86_64/repodata/repomd.xml"
            "rpm/el9/x86_64/repodata/repomd.xml.asc"
            "rpm/el9/aarch64/repodata/repomd.xml"
            "rpm/el9/aarch64/repodata/repomd.xml.asc"
            "rpm/el10/x86_64/repodata/repomd.xml"
            "rpm/el10/x86_64/repodata/repomd.xml.asc"
            "rpm/el10/aarch64/repodata/repomd.xml"
            "rpm/el10/aarch64/repodata/repomd.xml.asc"
          )

          for path in "${paths[@]}"; do
            url="${base_url}/${path}"
            ok=false
            for attempt in {1..12}; do
              if curl -fsSL "$url" >/tmp/klights-repo-check; then
                ok=true
                break
              fi
              sleep 5
            done
            if [[ "$ok" != "true" ]]; then
              echo "::error title=Package repository verification failed::Unable to fetch ${url}"
              exit 1
            fi
          done

          curl -fsSL "${base_url}/index.html" | grep -q "https://github.com/klights-net/klights-core"
          curl -fsSL "${base_url}/apt/index.html" | grep -q "https://github.com/klights-net/klights-core"
          curl -fsSL "${base_url}/klights-archive-keyring.asc" | grep -q "BEGIN PGP PUBLIC KEY BLOCK"
          curl -fsSL "${base_url}/apt/dists/noble/InRelease" | grep -q "BEGIN PGP SIGNED MESSAGE"
          curl -fsSL "${base_url}/apt/dists/resolute/InRelease" | grep -q "BEGIN PGP SIGNED MESSAGE"
          curl -fsSL "${base_url}/apt/dists/noble/main/binary-amd64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/apt/dists/noble/main/binary-arm64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/apt/dists/resolute/main/binary-amd64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/apt/dists/resolute/main/binary-arm64/Packages" | grep -q '^Package: klights$'
          curl -fsSL "${base_url}/rpm/el9/x86_64/repodata/repomd.xml" | grep -q 'primary'
          curl -fsSL "${base_url}/rpm/el9/aarch64/repodata/repomd.xml" | grep -q 'primary'
          curl -fsSL "${base_url}/rpm/el10/x86_64/repodata/repomd.xml" | grep -q 'primary'
          curl -fsSL "${base_url}/rpm/el10/aarch64/repodata/repomd.xml" | grep -q 'primary'
