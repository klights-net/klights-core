name: package-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-apt:
    name: Ubuntu ${{ matrix.ubuntu_version }} APT package smoke (${{ matrix.deb_arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu_version: "24.04"
            suite: noble
            runner: ubuntu-24.04
            deb_arch: amd64
            kubectl_arch: amd64
            container_name: klights-ubuntu-2404
          - ubuntu_version: "26.04"
            suite: resolute
            runner: ubuntu-24.04
            deb_arch: amd64
            kubectl_arch: amd64
            container_name: klights-ubuntu-2604
          - ubuntu_version: "24.04"
            suite: noble
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            kubectl_arch: arm64
            container_name: klights-ubuntu-2404-arm64
          - ubuntu_version: "26.04"
            suite: resolute
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            kubectl_arch: arm64
            container_name: klights-ubuntu-2604-arm64
    env:
      EXPECTED_KLIGHTS_VERSION: 0.9.10
    steps:
      - name: Start Ubuntu ${{ matrix.ubuntu_version }} systemd container
        run: |
          set -euo pipefail
          dockerfile="Dockerfile.ubuntu-${{ matrix.ubuntu_version }}-systemd"
          image="klights-ubuntu-${{ matrix.ubuntu_version }}-systemd-${{ matrix.deb_arch }}"
          cat > "$dockerfile" <<EOF_DOCKERFILE
          FROM ubuntu:${{ matrix.ubuntu_version }}
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update \
            && apt-get install -y --no-install-recommends ca-certificates dbus systemd systemd-sysv \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*
          STOPSIGNAL SIGRTMIN+3
          CMD ["/sbin/init"]
          EOF_DOCKERFILE
          docker build -t "$image" -f "$dockerfile" .

          sudo modprobe tun || true
          sudo mkdir -p /dev/net
          if [ ! -e /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

          docker run -d --name "${{ matrix.container_name }}" \
            --privileged \
            --cap-add=SYS_MODULE \
            --cgroupns=host \
            --device /dev/net/tun:/dev/net/tun \
            --security-opt seccomp=unconfined \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /run/lock \
            --tmpfs /var/lib/klights:exec,mode=0755 \
            -v /lib/modules:/lib/modules:ro \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            "$image"

          for attempt in {1..60}; do
            if docker exec "${{ matrix.container_name }}" systemctl is-system-running >/tmp/systemd-state 2>&1; then
              break
            fi
            state="$(cat /tmp/systemd-state || true)"
            if [[ "$state" == "degraded" ]]; then
              break
            fi
            sleep 2
          done

          docker exec "${{ matrix.container_name }}" systemctl status --no-pager || true

      - name: Install klights from APT repository
        run: |
          set -euo pipefail
          docker exec -e EXPECTED_KLIGHTS_VERSION "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            echo "deb [trusted=yes] https://raw.githubusercontent.com/klights-net/klights-core/package-repo/apt ${{ matrix.suite }} main" \
              > /etc/apt/sources.list.d/klights.list
            apt-get update
            apt-cache policy klights
            apt-get install -y klights
            dpkg-query -W -f="\${Version}\n" klights | grep -Fx "${EXPECTED_KLIGHTS_VERSION}-1~${{ matrix.suite }}"
            test -f /etc/default/klights
            grep -Fx "KLIGHTS_DATA_ROOT=/var/lib/klights" /etc/default/klights
            grep -Fx "KLIGHTS_ARGS=start" /etc/default/klights
            test -d /var/lib/klights
            systemctl cat klights | grep -F "RUST_LOG=info"
          '

      - name: Start klights service and wait for kubeconfig
        run: |
          set -euo pipefail
          docker exec "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            systemctl restart containerd
            systemctl restart klights
            for attempt in $(seq 1 180); do
              if test -s /var/lib/klights/etc/kubeconfig.yaml && systemctl is-active --quiet klights; then
                exit 0
              fi
              systemctl --no-pager --full status klights || true
              journalctl -u klights --no-pager -n 80 || true
              sleep 2
            done
            systemctl --no-pager --full status klights || true
            journalctl -u klights --no-pager -n 200 || true
            exit 1
          '

      - name: Install kubectl and verify node readiness
        run: |
          set -euo pipefail
          kubectl_bin="kubectl-${{ matrix.container_name }}"
          curl -fsSLo "$kubectl_bin" "https://dl.k8s.io/release/v1.34.1/bin/linux/${{ matrix.kubectl_arch }}/kubectl"
          docker cp "$kubectl_bin" "${{ matrix.container_name }}:/usr/local/bin/kubectl"
          docker exec -e EXPECTED_KLIGHTS_VERSION "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            chmod +x /usr/local/bin/kubectl
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl get nodes
            kubectl wait --for=condition=Ready node --all --timeout=5s
            kubectl get nodes -o wide
            kubectl version -o yaml | tee /tmp/klights-version.yaml
            grep -F "gitVersion: v1.34.6" /tmp/klights-version.yaml
          '

      - name: Deploy nginx and curl service from another pod
        run: |
          set -euo pipefail
          docker exec "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl create deployment nginx-smoke --image=nginx:alpine --port=80
            kubectl rollout status deployment/nginx-smoke --timeout=120s
            kubectl expose deployment nginx-smoke --port=80 --target-port=80
            kubectl get deployment nginx-smoke -o wide
            kubectl get svc nginx-smoke -o wide
            kubectl run curl-smoke --restart=Never --image=curlimages/curl:8.11.1 -- \
              sh -c "for attempt in \$(seq 1 60); do curl -fsS http://nginx-smoke.default.svc.cluster.local && exit 0; sleep 2; done; exit 1"
            kubectl wait --for=jsonpath="{.status.phase}"=Succeeded pod/curl-smoke --timeout=180s
            kubectl logs curl-smoke
          '

      - name: Collect Ubuntu diagnostics
        if: always()
        run: |
          docker exec "${{ matrix.container_name }}" bash -lc '
            set +e
            systemctl --no-pager --full status klights
            journalctl -u klights --no-pager -n 200
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl get nodes -o wide
            kubectl get pods -A -o wide
            kubectl get svc -A -o wide
            kubectl describe pod curl-smoke
            kubectl logs curl-smoke
          ' || true

  rhel-rpm:
    name: RHEL-compatible ${{ matrix.rhel_major }} RPM package smoke (${{ matrix.rpm_arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel_major: "9"
            el: el9
            image: almalinux:9
            runner: ubuntu-24.04
            rpm_arch: x86_64
            kubectl_arch: amd64
            container_name: klights-rhel9
          - rhel_major: "10"
            el: el10
            image: almalinux:10
            runner: ubuntu-24.04
            rpm_arch: x86_64
            kubectl_arch: amd64
            container_name: klights-rhel10
          - rhel_major: "9"
            el: el9
            image: almalinux:9
            runner: ubuntu-24.04-arm
            rpm_arch: aarch64
            kubectl_arch: arm64
            container_name: klights-rhel9-arm64
          - rhel_major: "10"
            el: el10
            image: almalinux:10
            runner: ubuntu-24.04-arm
            rpm_arch: aarch64
            kubectl_arch: arm64
            container_name: klights-rhel10-arm64
    env:
      EXPECTED_KLIGHTS_VERSION: 0.9.10
    steps:
      - name: Start RHEL-compatible ${{ matrix.rhel_major }} systemd container
        run: |
          set -euo pipefail
          sudo modprobe tun || true
          sudo mkdir -p /dev/net
          if [ ! -e /dev/net/tun ]; then
            sudo mknod /dev/net/tun c 10 200
          fi
          sudo chmod 0666 /dev/net/tun

          docker run -d --name "${{ matrix.container_name }}" \
            --privileged \
            --cap-add=SYS_MODULE \
            --cgroupns=host \
            --device /dev/net/tun:/dev/net/tun \
            --security-opt seccomp=unconfined \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /run/lock \
            --tmpfs /var/lib/klights:exec,mode=0755 \
            -v /lib/modules:/lib/modules:ro \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            "${{ matrix.image }}" /usr/sbin/init

          for attempt in {1..60}; do
            if docker exec "${{ matrix.container_name }}" systemctl is-system-running >/tmp/systemd-state 2>&1; then
              break
            fi
            state="$(cat /tmp/systemd-state || true)"
            if [[ "$state" == "degraded" ]]; then
              break
            fi
            sleep 2
          done

          docker exec "${{ matrix.container_name }}" systemctl status --no-pager || true

      - name: Install klights from RPM repository
        run: |
          set -euo pipefail
          docker exec -e EXPECTED_KLIGHTS_VERSION "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            cat >/etc/yum.repos.d/klights.repo <<EOF_REPO
          [klights]
          name=klights
          baseurl=https://raw.githubusercontent.com/klights-net/klights-core/package-repo/rpm/${{ matrix.el }}/${{ matrix.rpm_arch }}
          enabled=1
          gpgcheck=0
          EOF_REPO
            dnf -y makecache
            dnf -y install klights
            rpm -q --qf "%{VERSION}-%{RELEASE}\n" klights | grep -Fx "${EXPECTED_KLIGHTS_VERSION}-1.${{ matrix.el }}"
            test -f /etc/sysconfig/klights
            grep -Fx "KLIGHTS_DATA_ROOT=/var/lib/klights" /etc/sysconfig/klights
            grep -Fx "KLIGHTS_ARGS=start" /etc/sysconfig/klights
            test -d /var/lib/klights
            systemctl cat klights | grep -F "RUST_LOG=info"
          '

      - name: Start klights service and wait for kubeconfig
        run: |
          set -euo pipefail
          docker exec "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            systemctl restart containerd
            systemctl restart klights
            for attempt in $(seq 1 180); do
              if test -s /var/lib/klights/etc/kubeconfig.yaml && systemctl is-active --quiet klights; then
                exit 0
              fi
              systemctl --no-pager --full status klights || true
              journalctl -u klights --no-pager -n 80 || true
              sleep 2
            done
            systemctl --no-pager --full status klights || true
            journalctl -u klights --no-pager -n 200 || true
            exit 1
          '

      - name: Install kubectl and verify node readiness
        run: |
          set -euo pipefail
          kubectl_bin="kubectl-${{ matrix.container_name }}"
          curl -fsSLo "$kubectl_bin" "https://dl.k8s.io/release/v1.34.1/bin/linux/${{ matrix.kubectl_arch }}/kubectl"
          docker cp "$kubectl_bin" "${{ matrix.container_name }}:/usr/local/bin/kubectl"
          docker exec -e EXPECTED_KLIGHTS_VERSION "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            chmod +x /usr/local/bin/kubectl
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl get nodes
            kubectl wait --for=condition=Ready node --all --timeout=5s
            kubectl get nodes -o wide
            kubectl version -o yaml | tee /tmp/klights-version.yaml
            grep -F "gitVersion: v1.34.6" /tmp/klights-version.yaml
          '

      - name: Deploy nginx and curl service from another pod
        run: |
          set -euo pipefail
          docker exec "${{ matrix.container_name }}" bash -lc '
            set -euo pipefail
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl create deployment nginx-smoke --image=nginx:alpine --port=80
            kubectl rollout status deployment/nginx-smoke --timeout=120s
            kubectl expose deployment nginx-smoke --port=80 --target-port=80
            kubectl get deployment nginx-smoke -o wide
            kubectl get svc nginx-smoke -o wide
            kubectl run curl-smoke --restart=Never --image=curlimages/curl:8.11.1 -- \
              sh -c "for attempt in \$(seq 1 60); do curl -fsS http://nginx-smoke.default.svc.cluster.local && exit 0; sleep 2; done; exit 1"
            kubectl wait --for=jsonpath="{.status.phase}"=Succeeded pod/curl-smoke --timeout=180s
            kubectl logs curl-smoke
          '

      - name: Collect RHEL-compatible diagnostics
        if: always()
        run: |
          docker exec "${{ matrix.container_name }}" bash -lc '
            set +e
            systemctl --no-pager --full status klights
            journalctl -u klights --no-pager -n 200
            export KUBECONFIG=/var/lib/klights/etc/kubeconfig.yaml
            kubectl get nodes -o wide
            kubectl get pods -A -o wide
            kubectl get svc -A -o wide
            kubectl describe pod curl-smoke
            kubectl logs curl-smoke
          ' || true
